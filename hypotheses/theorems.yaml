      - kind: pytest
        ref: tests/test_mathematical_properties.py::TestIntegrableRMatrix::test_stochastic_gauge_does_not_satisfy_lifted_braid_relation
    used_by: [model_guided_research-u55.3]
    depends_on: [thm-ybe-transfer-commutativity]

  - id: thm-triality-invariance
    statement: >-
      Spin(8) triality permutes the three inequivalent 8-dimensional
      representations, and the octonionic trilinear form t(x,y,z) =
      Re((xy) conj(z)) is invariant under triality triples acting on the three
      slots - the symmetry type matching attention's (Q,K,V) trilinearity.
    status: proved-on-paper
