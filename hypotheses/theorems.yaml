  - id: thm-shadow-hamiltonian
    statement: >-
      A symplectic integrator exactly conserves a shadow Hamiltonian
      H-tilde = H + O(h^2) for exponentially long times; translated to depth,
      a quantity epsilon-close to the learned energy is conserved across
