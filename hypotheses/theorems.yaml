    used_by: [model_guided_research-u55.3]
    depends_on: []

  - id: thm-rmatrix-mass-partition
    statement: >-
      In the stochastic gauge (bg, cg) = (b, c)/(b+c) of the trigonometric
      crossing weights, bg + cg = 1 per crossing, so the causal monodromy
      sweep telescopes to an exact partition of unity: sum_j A_ij +
      prod_{j<=i} cg(u_i - u_j) = 1 for every query i. This is the Q1 charge
      whose drift is exactly zero for the rmatrix law and measurably nonzero
      for the additive heuristic crossing modes; the per-crossing stochastic
      normalization does NOT satisfy the lifted braid relation (the identity
      slots do not rescale), which is why the law is a-normalized and the
      gauge lives only in the value kernel.
    status: proved-on-paper
    mechanisms: [braid]
    source_note:
      path: markdown_documentation/integrable_attention_rmatrix.md
      anchor: conserved charges
    proof_location: "integrable_attention_rmatrix.md sections 2 and 4 (telescoping; gauge subtlety in 1.2)"
    numerical_checks:
