  - id: thm-evt-maxplus-concentration
    statement: >-
      The max of N independent Gaussian-scale terms concentrates at
      sqrt(2 ln N) with Gumbel fluctuations - extreme-value class, not the
      sqrt(N) CLT class - so max-plus layers (attention or FFN, width N or
      d_ff) require log-width-corrected initialization and learning-rate
      exponents.
    status: proved-on-paper
    mechanisms: [tropical]
    source_note:
