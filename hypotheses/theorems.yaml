  - id: thm-rmatrix-inversion-protected-memory
    statement: >-
      The trigonometric six-vertex braid law satisfies the inversion relation
      N(w) N(-w) = I exactly (from sinh(eta+w) sinh(eta-w) = sinh^2(eta) -
      sinh^2(w)), in both the a-normalized and the stochastic gauge (the gauge
      scalars multiply to 1). Every rmatrix mixing layer is therefore exactly
      invertible by the same law at negated rapidity differences: protected
      memory by algebra, not by empirical regularity.
    status: proved-on-paper
    mechanisms: [braid]
    source_note:
      path: markdown_documentation/integrable_attention_rmatrix.md
      anchor: The R-matrix
    proof_location: "integrable_attention_rmatrix.md section 1 (two-line hyperbolic identity)"
