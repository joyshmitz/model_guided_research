  - id: thm-kick-kick-symplectic
    statement: >-
      With F = grad(phi_F) and G = grad(phi_G), the coupled updates
      y1 = x1 + F(x2); y2 = x2 + G(y1) compose two gradient shears, each an
      exact symplectic map (Hessian symmetry), so the block is an exact
      symplectic integrator for the separable Hamiltonian
      H(x1,x2) = phi_F(x2) + phi_G(x1).
    status: proved-on-paper
    mechanisms: [reversible]
