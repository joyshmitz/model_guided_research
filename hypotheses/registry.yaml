  - id: hyp-rmatrix-s5-length-slope
    statement: >-
      On S5 word problems (non-solvable; NC1-complete state tracking), R-matrix
      braid attention shows a length-generalization slope at least 2x flatter
      than standard attention at equal FLOPs: integrable monodromy mixing
      matches the task's sequential-composition structure, so accuracy decays
      with held-out word length at no more than half the baseline rate. No
      expressivity-separation claim is made (both mechanisms sit inside the
      TC0-type upper bounds); this is a learnability/extrapolation-slope claim.
    mechanisms: [braid]
    source:
      kind: model
      provenance: "EPIC THEORY-II u55.3 (preregistered leapfrog test); theory note markdown_documentation/integrable_attention_rmatrix.md section 6"
    date_registered: "2026-06-11"
    theorem_refs: [thm-ybe-transfer-commutativity, thm-rmatrix-inversion-protected-memory]
    prediction:
      metric_path: "evaltasks:tasks.group.length_slope.by_category.s5.slope"
      comparator: ">="
      threshold_kind: ratio
      threshold: 0.5
      baseline: {mechanism: standard, equal_flops: true}
      min_seeds: 3
      scale_caveats: >-
        Slopes are negative (accuracy decays with length): M >= 0.5*B means the
        rmatrix arm keeps at most half the baseline decay rate. The engine's
        answer-prior floor gate does not fire on slope paths, so the verdict is
        meaningful ONLY if the baseline's in-range exact match clears the group
        answer prior - a flat-at-chance baseline has slope ~0 and the
        comparison is vacuous; adjudication must check that precondition by
        hand (or via hyp-group-nonsolvable-barrier's baseline curves) until the
        engine learns slope-path floors. The candidate arm is selected by
        variant {braid_crossing_law: rmatrix} against the standard-mechanism
        baseline.
