# =============================================================================
# HYPOTHESIS REGISTRY — the empirical twin of hypotheses/theorems.yaml.
#
# Bead: model_guided_research-hij.1 (EPIC model_guided_research-hij)
#
# WHAT THIS FILE IS
#   Every load-bearing EMPIRICAL claim in this project gets one entry here: a
#   stable id, the claim in prose, where the claim came from, and — when the
#   claim is operationalized — a PREREGISTERED prediction naming the exact
#   metric, comparator, baseline, effect size, and seed count that would
#   support or refute it. Mathematical claims live in theorems.yaml; a claim
#   lives in exactly one registry. Before this file, claims lived in README
#   prose and the framework docs where none could ever be formally confirmed
#   or retired.
#
# SERIALIZATION (inherited from vnl.1, which landed first and decided for
#   both registries): YAML via PyYAML safe_load.
#
# STATUS SEMANTICS
#   open          — registered, no adjudicated evidence yet.
#   supported     — adjudicated evidence meets the registered prediction.
#   refuted       — adjudicated evidence contradicts the registered prediction.
#   inconclusive  — evidence gathered but does not decide (e.g. CI spans 0).
#   blocked       — cannot run yet; operationalization_note names the blocker.
#
# PREDICTION SEMANTICS (the contract the verdict engine hij.2 will execute)
#   metric_path: "<schema>:<dotted.path>" into a versioned artifact schema:
#     evaltasks — mgr.evaltasks.v1 (mgr eval-tasks summary.json)
#     train     — mgr.telemetry.v1 (nanochat train summary.json)
#     certify   — mgr certify summary.json
#     bench     — mgr bench-fixed-flops aggregate
#   comparator + threshold_kind define the claim, with M = metric(mechanism)
#   and B = metric(baseline.mechanism) at the SAME FLOPs budget:
#     ">=" + absolute_delta : claim holds iff M >= B + threshold
#     "<=" + absolute_delta : claim holds iff M <= B - threshold
#     ">=" + ratio          : claim holds iff M >= threshold * B
#     "<=" + ratio          : claim holds iff M <= threshold * B
#   min_seeds: the verdict needs at least this many seeds per arm; the CI
#   convention (mean +/- CI95 must clear the threshold) is adjudicated by
#   hij.2, recorded in verdict_history.
#   prediction: null is allowed ONLY with an operationalization_note naming
#   what is missing — visible debt, never silent omission.
#
# GOVERNANCE
#   Changes flow through normal git review. verdict_history is APPEND-ONLY:
#   `mgr hypotheses validate` compares against the committed parent version
#   (git HEAD) and rejects any rewrite or truncation of an existing entry's
#   history. New evidence appends; it never replaces.
# =============================================================================

