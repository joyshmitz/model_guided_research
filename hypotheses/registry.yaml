  - id: hyp-group-nonsolvable-barrier
    statement: >-
      No fixed-depth mechanism in the current zoo solves held-out-length word
      problems in non-solvable groups (S5/A5) — the known TC0 state-tracking
      barrier — while solvable controls (Z60/S3) remain learnable; a
      mechanism that moves the S5/A5 curve without moving the controls would
